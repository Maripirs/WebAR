<!doctype html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- A-Frame loads first - 3D rendering engine -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <!-- AR.js loads second - tracking library -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #loading-message {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            padding: 12px 16px;
            background: rgba(255, 247, 251, 0.9);
            color: #3f2a5f;
            border-radius: 14px;
            text-align: center;
            z-index: 10;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div id="loading-message">
        Point your camera at the Hiro marker.
    </div>

    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false"
        renderer="antialias: true; alpha: true">

        <a-marker preset="hiro">
            <a-gltf-model
                src="./playing_piece_set_for_board_games.glb"
                position="0 0.25 0"
                rotation="0 0 0"
                scale="0.05 0.05 0.05"
                animation="property: scale; from: 0.05 0.05 0.05; to: 0.07 0.07 0.07; dir: alternate; loop: true; dur: 900; easing: easeInOutSine">
            </a-gltf-model>

            <a-text
                value="GameMatch AR"
                position="0 0.9 0"
                rotation="-90 0 0"
                align="center"
                color="#B99BEA"
                scale="0.8 0.8 0.8">
            </a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
